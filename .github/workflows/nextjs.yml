# DeFi Academy: statischer Next-Export nach GitHub Pages.
# Repo: Settings -> Pages -> Source: GitHub Actions

name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  # Externer Webhook: POST .../dispatches mit event_type "pages-deploy" (siehe docs/GITHUB_PAGES.md)
  repository_dispatch:
    types: [pages-deploy]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

# Opt-in auf Node.js 24 fuer JS-basierte Actions (Pflicht ab 02.06.2026).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - run: npm run validate:content
      - run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_SITE_URL: "https://noahdeitmerg-svg.github.io/Defi-Academy"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
