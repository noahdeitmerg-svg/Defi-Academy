<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0B1F3B"/>

  <!-- Subtle radial glow (very low opacity) -->
  <defs>
    <radialGradient id="bgGlow" cx="70%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5B841" stop-opacity="0.04"/>
      <stop offset="60%" stop-color="#F5B841" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgGlow)"/>

  
  <text x="120" y="60" font-family="Inter" font-size="14" font-weight="600"
        letter-spacing="1.4px" fill="#6B7A8F">MODUL 01 · LEKTION 01</text>
  
  <!-- Category pill -->
  <g>
    <rect x="120" y="100" width="132" height="36" rx="18"
          fill="rgba(245, 184, 65, 0.10)" stroke="#F5B841" stroke-width="1.5"/>
    <text x="186" y="124" text-anchor="middle"
          font-family="Inter" font-size="14" font-weight="600"
          letter-spacing="1.4px" fill="#F5B841">GRUNDLAGEN</text>
  </g>
  
  <!-- Title accent bar -->
  <rect x="120" y="210" width="6" height="78"
        rx="3" fill="#F5B841"/>
  <!-- Title text -->
    <text x="148" y="260"
          font-family="Inter" font-size="56" font-weight="700"
          letter-spacing="-1.12px" fill="#FFFFFF">Was ist DeFi?</text>
  
    <circle cx="148" cy="476" r="16"
            fill="rgba(245, 184, 65, 0.10)" stroke="#F5B841" stroke-width="2"/>
    <path d="M 141 476 l 5 5 l 9 -10"
          stroke="#F5B841" stroke-width="2.5" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="480"
          font-family="Inter" font-size="26" font-weight="500"
          fill="#FFFFFF">Finanzanwendungen auf öffentlichen</text>
    <text x="180" y="520"
          font-family="Inter" font-size="26" font-weight="500"
          fill="#FFFFFF">Blockchains, ausgeführt durch Smart</text>
    <text x="180" y="560"
          font-family="Inter" font-size="26" font-weight="500"
          fill="#FFFFFF">Contracts, ohne zentrale Intermediäre</text>
  
  <!-- Hero motif (module 1) -->
  <g transform="translate(1260, 340)">
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="220" cy="220" r="160" stroke="rgba(245, 184, 65, 0.35)" fill="none" stroke-width="2" stroke-dasharray="4 6"/>
    <circle cx="220" cy="220" r="110" stroke="rgba(245, 184, 65, 0.35)" fill="none" stroke-width="2"/>
    <circle cx="220" cy="220" r="60" stroke="#F5B841" fill="none" stroke-width="2"/>
    <circle cx="220" cy="220" r="6" fill="#F5B841"/>
    <line x1="220" y1="60" x2="220" y2="110" stroke="rgba(245, 184, 65, 0.15)" stroke-width="1"/>
    <line x1="220" y1="330" x2="220" y2="380" stroke="rgba(245, 184, 65, 0.15)" stroke-width="1"/>
    <line x1="60" y1="220" x2="110" y2="220" stroke="rgba(245, 184, 65, 0.15)" stroke-width="1"/>
    <line x1="330" y1="220" x2="380" y2="220" stroke="rgba(245, 184, 65, 0.15)" stroke-width="1"/>
  </g>
</g>
  
  
  <!-- Footer divider -->
  <line x1="120" y1="980" x2="1800" y2="980"
        stroke="#1A355F" stroke-width="1"/>

  <!-- Shield + DeFi Academy lockup, centered -->
  <g transform="translate(840, 996)">
    <!-- Shield icon (scaled) -->
    <g transform="scale(1.2)">
      <path d="M 16 2 L 28 6 L 28 16 C 28 22 23 27 16 30 C 9 27 4 22 4 16 L 4 6 Z"
            stroke="#F5B841" stroke-width="1.5" fill="none"
            stroke-linejoin="round"/>
      <g stroke="#FFFFFF" stroke-width="1" stroke-linecap="round">
        <line x1="16" y1="16" x2="12" y2="11"/>
        <line x1="16" y1="16" x2="20" y2="11"/>
        <line x1="16" y1="16" x2="16" y2="22"/>
      </g>
      <circle cx="12" cy="11" r="1.8" fill="#FFFFFF"/>
      <circle cx="20" cy="11" r="1.8" fill="#FFFFFF"/>
      <circle cx="16" cy="22" r="1.8" fill="#FFFFFF"/>
      <circle cx="16" cy="16" r="2.4" fill="#F5B841"/>
    </g>
    <!-- DeFi Academy wordmark -->
    <text x="56" y="26" font-family="Inter" font-size="22" font-weight="700"
          letter-spacing="0.44px" fill="#FFFFFF">DeFi</text>
    <text x="112" y="26" font-family="Inter" font-size="22" font-weight="700"
          letter-spacing="0.44px" fill="#F5B841">Academy</text>
  </g>
</svg>