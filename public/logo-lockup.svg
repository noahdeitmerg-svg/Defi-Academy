<?xml version="1.0" encoding="UTF-8"?>
<!--
  DeFi Academy — Horizontal Lockup
  Symbol (64×64) + Wortmarke ("DeFi Academy")
  Abstandsregel: x-height des Logos = Leerraum zwischen Symbol und
  Wortmarke. Gesamt-viewBox lässt 16px Padding rundherum.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 360 80"
  fill="none"
  role="img"
  aria-label="DeFi Academy"
>
  <title>DeFi Academy</title>

  <!-- Symbol (translated into lockup) -->
  <g transform="translate(8, 8)">
    <path
      d="M32 4 L54 12 L54 32 C54 44.5 44.5 55 32 60 C19.5 55 10 44.5 10 32 L10 12 Z"
      stroke="#F5B841" stroke-width="2" stroke-linejoin="round" fill="none"
    />
    <g stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round">
      <line x1="32" y1="32" x2="24" y2="22" />
      <line x1="32" y1="32" x2="40" y2="22" />
      <line x1="32" y1="32" x2="32" y2="44" />
    </g>
    <g fill="#FFFFFF">
      <circle cx="24" cy="22" r="3.2" />
      <circle cx="40" cy="22" r="3.2" />
      <circle cx="32" cy="44" r="3.2" />
    </g>
    <circle cx="32" cy="32" r="4.2" fill="#F5B841" />
  </g>

  <!-- Wordmark -->
  <!-- "DeFi" in white, "Academy" in accent gold -->
  <text
    x="96" y="52"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="36"
    letter-spacing="-0.015em"
  >
    <tspan fill="#FFFFFF">DeFi</tspan><tspan fill="#F5B841"> Academy</tspan>
  </text>
</svg>
